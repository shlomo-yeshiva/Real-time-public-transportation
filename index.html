<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה - אוטובוסים ומיקום בזמן אמת</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
        }
        h1 { font-size: 20px; margin-bottom: 10px; font-weight: 600; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .input-group label { font-size: 14px; margin-left: 8px; color: #fff; }
        input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            width: 130px;
            font-family: inherit;
        }
        input::placeholder { color: #e0f2f1; }
        button {
            background-color: #ffffff;
            color: #11998e;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover { background-color: #f0f0f0; }
        button.geo-btn {
            background-color: #007bff;
            color: white;
        }
        button.geo-btn:hover { background-color: #0056b3; }
        .loading-container {
            margin-top: 10px;
            font-size: 14px;
            color: #fff;
            display: none;
            font-weight: bold;
        }
        #map { flex-grow: 1; width: 100%; height: 100%; }
        .popup-rtl { text-align: right; direction: rtl; }
        .popup-rtl h3 { color: #11998e; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>מערכת ניטור אוטובוסים ומיקום בזמן אמת</h1>
        <div class="controls">
            <div class="input-group">
                <label for="lineInput">מספר קו:</label>
                <input type="text" id="lineInput" placeholder="הכנס קו (למשל: 569)">
            </div>
            <button onclick="searchBusRoute()">חפש קו על המפה</button>
            <button class="geo-btn" onclick="locateUser()">📍 איפה אני נמצא?</button>
        </div>
        <div id="loadingStatus" class="loading-container">⏳ טוען נתונים...</div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // אתחול המפה ברירת מחדל על מרכז הארץ
        const map = L.map('map').setView([32.0853, 34.7818], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let busLayers = [];
        let userMarker = null;

        // פונקציה שמבקשת גישה ל-GPS של המשתמש ומציגה אותו על המפה
        function locateUser() {
            if (!navigator.geolocation) {
                alert("הדפדפן שלך לא תומך בשירותי מיקום.");
                return;
            }

            document.getElementById('loadingStatus').innerText = "⏳ משיג מיקום GPS נוכחי...";
            document.getElementById('loadingStatus').style.display = 'block';

            // פנייה לרכיב הגיאולוקציה הרישמי של המכשיר
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // אם כבר יש מרקר של המשתמש - נסיר אותו כדי לא ליצור כפילויות
                    if (userMarker) {
                        map.removeLayer(userMarker);
                    }

                    // יצירת מרקר כחול בולט למיקום שלך
                    userMarker = L.circleMarker([lat, lon], {
                        radius: 9,
                        fillColor: "#007bff", // צבע כחול למשתמש
                        color: "#fff",
                        weight: 3,
                        opacity: 1,
                        fillOpacity: 0.9
                    }).addTo(map);

                    userMarker.bindPopup(`
                        <div class="popup-rtl">
                            <h3 style="color: #007bff;">📍 אתה נמצא כאן!</h3>
                            <p>המיקום שלך זוהה בהצלחה על גבי המפה.</p>
                        </div>
                    `).openPopup();

                    // מיקוד המפה ישירות עליך בזום קרוב (15)
                    map.setView([lat, lon], 15);
                    
                    document.getElementById('loadingStatus').style.display = 'none';
                },
                (error) => {
                    document.getElementById('loadingStatus').style.display = 'none';
                    // טיפול בשגיאות (למשל אם המשתמש לחץ "חסום" או "אל תאשר")
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            alert("על מנת להציג את המיקום, יש לאשר גישה למיקום בהגדרות הדפדפן.");
                            break;
                        case error.POSITION_UNAVAILABLE:
                            alert("מידע המיקום אינו זמין כעת ממכשירך.");
                            break;
                        case error.TIMEOUT:
                            alert("הבקשה לקבלת מיקום פגה. נסה שוב.");
                            break;
                        default:
                            alert("אירעה שגיאה בלתי צפויה בקבלת המיקום.");
                    }
                },
                {
                    enableHighAccuracy: true, // שימוש ב-GPS מירבי ומדויק בטלפונים
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // פונקציית החיפוש של האוטובוסים (נשארת ועובדת במקביל)
        async function searchBusRoute() {
            const lineNum = document.getElementById('lineInput').value.trim();
            const loadingStatus = document.getElementById('loadingStatus');

            if (!lineNum) {
                alert('אנא הכנס מספר קו.');
                return;
            }

            loadingStatus.innerText = "⏳ מתחבר לשרת הציבורי ושולף נתונים בארץ...";
            loadingStatus.style.display = 'block';
            clearBusLayers();

            try {
                const overpassQuery = `
                    [out:json][timeout:25];
                    (
                      relation["type"="route"]["route"="bus"]["ref"="${lineNum}"](29.5,34.0,33.5,36.0);
                    );
                    out body;
                    >;
                    out skel qt;
                `;
                
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('שגיאת שרת');
                const data = await response.json();

                if (!data.elements || data.elements.length === 0) {
                    alert(`לא נמצאו נתיבים פעילים בישראל עבור קו ${lineNum}.`);
                    return;
                }

                const nodes = {};
                data.elements.forEach(el => {
                    if (el.type === 'node') {
                        nodes[el.id] = [el.lat, el.lon];
                    }
                });

                let bounds = [];

                data.elements.forEach(el => {
                    if (el.type === 'relation' && el.members) {
                        const operator = el.tags.operator || 'מפעיל תחבורה';
                        const from = el.tags.from || 'מוצא';
                        const to = el.tags.to || 'יעד';

                        el.members.forEach(member => {
                            if (member.type === 'node' && nodes[member.ref]) {
                                const coords = nodes[member.ref];
                                bounds.push(coords);

                                const marker = L.circleMarker(coords, {
                                    radius: 6,
                                    fillColor: "#11998e", // צבע ירוק לאוטובוסים
                                    color: "#fff",
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.8
                                }).addTo(map);

                                marker.bindPopup(`
                                    <div class="popup-rtl">
                                        <h3>קו ${lineNum} - ${operator}</h3>
                                        <p><strong>מסלול:</strong> מ${from} אל ${to}</p>
                                        <p>✨ נתונים פעילים זמינים בארץ</p>
                                    </div>
                                `);
                                busLayers.push(marker);
                            }
                        });
                    }
                });

                if (bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [40, 40] });
                }

            } catch (error) {
                console.error(error);
                alert('ארעה שגיאה בקבלת הנתונים מהשרת. נסה שוב.');
            } finally {
                loadingStatus.style.display = 'none';
            }
        }

        function clearBusLayers() {
            busLayers.forEach(layer => map.removeLayer(layer));
            busLayers = [];
        }
    </script>
</body>
</html>
