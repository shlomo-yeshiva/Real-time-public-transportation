<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רדאר אוטובוסים - זמן אמת מוחלט</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
        }
        h1 { font-size: 20px; margin-bottom: 10px; font-weight: 600; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background-color: #ffffff;
            color: #11998e;
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover { background-color: #f0f0f0; }
        button.geo-btn { background-color: #007bff; color: white; }
        button.geo-btn:hover { background-color: #0056b3; }
        
        .status-bar {
            margin-top: 10px;
            font-size: 13px;
            color: #fff;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-weight: 500;
        }
        #map { flex-grow: 1; width: 100%; height: 100%; }
        .popup-rtl { text-align: right; direction: rtl; min-width: 160px; }
        .popup-rtl h3 { color: #11998e; margin-bottom: 5px; font-size: 15px; }
        .popup-rtl p { font-size: 13px; color: #555; margin: 3px 0; }
    </style>
</head>
<body>

    <header>
        <h1>📡 רדאר GPS - אוטובוסים פעילים בסביבה שלי (SIRI)</h1>
        <div class="controls">
            <button class="geo-btn" onclick="locateAndCenter()">📍 מצא אותי וסרוק סביבה</button>
            <button onclick="updateBusesInView()">🔄 סרוק אזור נוכחי מחדש</button>
        </div>
        <div class="status-bar">
            <span id="loadingStatus">🟢 המערכת מוכנה</span>
            <span id="autoRefreshStatus">⏱️ רענון אוטומטי חי (כל 15 שניות)</span>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // אתחול המפה על ירושלים / מרכז הארץ ברירת מחדל
        const map = L.map('map').setView([32.0853, 34.7818], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let busMarkers = [];
        let userMarker = null;
        let isIntervalActive = false;

        window.onload = function() {
            locateAndCenter();
            
            // טיימר רענון קבוע שפונה לשרת ה-SIRI בזמן אמת בכל 15 שניות
            setInterval(() => {
                updateBusesInView();
            }, 15000);
        };

        // זיהוי מיקום ה-GPS המדויק שלך
        function locateAndCenter() {
            if (!navigator.geolocation) return;

            document.getElementById('loadingStatus').innerText = "⏳ מזהה מיקום GPS...";

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                if (userMarker) map.removeLayer(userMarker);

                userMarker = L.circleMarker([lat, lon], {
                    radius: 9,
                    fillColor: "#007bff",
                    color: "#fff",
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                userMarker.bindPopup(`
                    <div class="popup-rtl">
                        <h3 style="color: #007bff;">📍 אתה נמצא כאן</h3>
                        <p>הסריקה מתבצעת כעת ברחובות סביבך.</p>
                    </div>
                `);

                map.setView([lat, lon], 15);
                updateBusesInView();
            }, (error) => {
                document.getElementById('loadingStatus').innerText = "❌ אין אישור מיקום";
            }, { enableHighAccuracy: true });
        }

        // פונקציית הליבה החדשה שמביאה את שידורי ה-GPS האמיתיים של האוטובוסים מהסדנא לידע ציבורי
        async function updateBusesInView() {
            const loadingStatus = document.getElementById('loadingStatus');
            loadingStatus.innerText = "⚡ שולף מיקומי GPS חיים מהסדנא...";

            try {
                const bounds = map.getBounds();
                const south = bounds.getSouthWest().lat;
                const west = bounds.getSouthWest().lng;
                const north = bounds.getNorthEast().lat;
                const east = bounds.getNorthEast().lng;

                // פנייה לשרת ה-SIRI הציבורי עם גבולות הראייה של המפה שלך
                const targetUrl = `https://api.opentransit.org.il/siri/vehicle_locations?min_lat=${south}&min_lon=${west}&max_lat=${north}&max_lon=${east}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error();
                const wrapperData = await response.json();
                const data = JSON.parse(wrapperData.contents);

                clearBusMarkers();

                if (!data || data.length === 0) {
                    loadingStatus.innerText = "🟢 אין אוטובוסים בנסיעה כרגע באזור זה";
                    return;
                }

                let count = 0;

                data.forEach(bus => {
                    const lat = bus.latitude;
                    const lon = bus.longitude;

                    if (lat && lon) {
                        const lineRef = bus.route_short_name || '??';
                        const operator = bus.operator_name || 'חברה';
                        const destination = bus.destination_name || 'בנסיעה';
                        
                        let timeString = 'עכשיו';
                        if (bus.recorded_at_time) {
                            try {
                                timeString = new Date(bus.recorded_at_time).toLocaleTimeString('he-IL', {
                                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                                });
                            } catch(e) {}
                        }

                        // יצירת אייקון אדום/כתום דינמי שמופיע רק עבור רכבים שנוסעים פיזית ברגע זה!
                        const marker = L.circleMarker([lat, lon], {
                            radius: 7,
                            fillColor: "#ff4757",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map);

                        marker.bindPopup(`
                            <div class="popup-rtl">
                                <h3>קו ${lineRef} - ${operator}</h3>
                                <p><strong>יעד:</strong> ${destination}</p>
                                <p><strong>שידור GPS אחרון:</strong> ${timeString}</p>
                            </div>
                        `);
                        
                        busMarkers.push(marker);
                        count++;
                    }
                });

                loadingStatus.innerText = `🟢 רדאר חי: מציג ${count} אוטובוסים בתנועה סביבך`;

            } catch (error) {
                console.error(error);
                loadingStatus.innerText = "❌ שגיאה בקבלת נתוני לווין";
            }
        }

        function clearBusMarkers() {
            busMarkers.forEach(marker => map.removeLayer(marker));
            busMarkers = [];
        }

        // סריקה אוטומטית מחדש ברגע שאתה מזיז את המפה למקום אחר
        map.on('moveend', () => {
            updateBusesInView();
        });
    </script>
</body>
</html>
