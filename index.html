<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה - אוטובוסים בזמן אמת</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 4px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .input-group:focus-within {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .input-group label {
            font-size: 14px;
            margin-left: 8px;
            color: #e0e6ed;
            font-weight: 500;
        }
        input, select {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px 4px;
            outline: none;
            font-family: inherit;
        }
        select option {
            background-color: #1e3c72;
            color: white;
        }
        input::placeholder {
            color: #b0c4de;
        }
        input[type="text"] {
            width: 100px;
            text-align: center;
        }
        button {
            background-color: #ff9f43;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #f39c12;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }
        button:active {
            transform: translateY(1px);
        }
        .loading-container {
            margin-top: 12px;
            font-size: 14px;
            color: #f1c40f;
            display: none;
            font-weight: 500;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        #map {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
        /* עיצוב הפופאפ של Leaflet */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 4px;
        }
        .bus-popup-content {
            direction: rtl;
            text-align: right;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-width: 180px;
        }
        .bus-popup-content h3 {
            margin-bottom: 8px;
            color: #1e3c72;
            font-size: 16px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 4px;
        }
        .bus-popup-content p {
            font-size: 13px;
            margin-bottom: 5px;
            color: #555;
        }
        .bus-popup-content strong {
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <header>
        <h1>מרכז בקרה בזמן אמת - מיקומי אוטובוסים</h1>
        <div class="controls">
            <div class="input-group">
                <label for="operatorSelect">מפעיל:</label>
                <select id="operatorSelect">
                    <option value="">כל החברות</option>
                    <option value="אגד">אגד</option>
                    <option value="דן">דן</option>
                    <option value="קווים">קווים</option>
                    <option value="מטרופולין">מטרופולין</option>
                    <option value="אפיקים">אלקטרה אפיקים</option>
                    <option value="סופרבוס">סופרבוס</option>
                    <option value="תנופה">תנופה</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="lineInput">מספר קו:</label>
                <input type="text" id="lineInput" placeholder="למשל: 1" autocomplete="off">
            </div>
            
            <button onclick="searchBus()">חפש עכשיו</button>
        </div>
        <div id="loadingStatus" class="loading-container">⚡ מתחבר לנתוני GPS ומעבד מיקומים...</div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // אתחול המפה ומירכוז ברירת מחדל על ישראל
        const map = L.map('map').setView([32.0853, 34.7818], 9);

        // טעינת שכבת המפה מ-OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let busMarkers = [];

        async function searchBus() {
            const lineRef = document.getElementById('lineInput').value.trim();
            const selectedOperator = document.getElementById('operatorSelect').value;
            const loadingStatus = document.getElementById('loadingStatus');

            if (!lineRef) {
                alert('אנא הכנס מספר קו לחיפוש.');
                return;
            }

            // הצגת חיווי טעינה וניקוי מרקרים קודמים
            loadingStatus.style.display = 'block';
            clearMarkers();

            try {
                // בניית כתובת ה-API של OpenTransit עם עקיפת CORS באמצעות AllOrigins
                const targetUrl = encodeURIComponent(`https://api.opentransit.org.il/siri/vehicle_locations?route_short_name=${lineRef}`);
                const url = `https://api.allorigins.win/get?url=${targetUrl}`;

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('השרת לא הגיב בצורה תקינה.');
                }

                const json = await response.json();
                
                if (!json.contents) {
                    throw new Error('לא התקבלו נתונים מהפרוקסי.');
                }

                let data = JSON.parse(json.contents);

                if (!data || data.length === 0) {
                    alert(`לא נמצאו אוטובוסים פעילים ברגע זה בארץ עבור קו ${lineRef}.`);
                    return;
                }

                // סינון הנתונים לפי המפעיל שנבחר (מניעת בליל וכפילויות)
                if (selectedOperator) {
                    data = data.filter(bus => bus.operator_name && bus.operator_name.includes(selectedOperator));
                }

                if (data.length === 0) {
                    alert(`נמצאו נתונים לקו ${lineRef}, אך אף אחד מהם אינו שייך לחברת "${selectedOperator}".`);
                    return;
                }

                let bounds = [];

                data.forEach(bus => {
                    const lat = bus.latitude;
                    const lon = bus.longitude;

                    if (lat && lon) {
                        const operator = bus.operator_name || 'מפעיל לא ידוע';
                        const destination = bus.destination_name || 'יעד לא צוין';
                        
                        // עיבוד שעת עדכון אחרונה לשעון ישראל מקומי
                        let timeString = 'לא ידוע';
                        if (bus.recorded_at_time) {
                            try {
                                timeString = new Date(bus.recorded_at_time).toLocaleTimeString('he-IL', {
                                    hour: '2-digit',
                                    minute: '2-digit',
                                    second: '2-digit'
                                });
                            } catch (e) {
                                timeString = bus.recorded_at_time;
                            }
                        }

                        // תוכן הפופאפ המעוצב
                        const popupContent = `
                            <div class="bus-popup-content">
                                <h3>קו ${lineRef} - ${operator}</h3>
                                <p><strong>כיוון/יעד סופי:</strong> ${destination}</p>
                                <p><strong>עדכון GPS אחרון:</strong> ${timeString}</p>
                            </div>
                        `;

                        // יצירת המרקר והוספתו למפה
                        const marker = L.marker([lat, lon]).addTo(map).bindPopup(popupContent);
                        busMarkers.push(marker);
                        bounds.push([lat, lon]);
                    }
                });

                // מיקוד ומירכוז אוטומטי של המפה על בסיס מיקומי האוטובוסים שנמצאו
                if (bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                } else {
                    alert('לא נמצאו קואורדינטות מיקום תקינות להצגה עבור קו זה.');
                }

            } catch (error) {
                console.error('Error fetching bus data:', error);
                alert('אירעה שגיאה בתקשורת עם השרת או בעיבוד הנתונים. אנא נסה שנית בעוד מספר רגעים.');
            } finally {
                // הסתרת חיווי הטעינה בסיום
                loadingStatus.style.display = 'none';
            }
        }

        function clearMarkers() {
            busMarkers.forEach(marker => map.removeLayer(marker));
            busMarkers = [];
        }
    </script>
</body>
</html>
