<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה - אוטובוסים בזמן אמת</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 15px; font-weight: 600; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-group label { font-size: 14px; margin-left: 8px; color: #e0e6ed; }
        input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            width: 120px;
            text-align: center;
            font-family: inherit;
        }
        input::placeholder { color: #b0c4de; }
        button {
            background-color: #ff9f43;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover { background-color: #f39c12; }
        .loading-container {
            margin-top: 10px;
            font-size: 14px;
            color: #f1c40f;
            display: none;
            font-weight: 500;
        }
        #map { flex-grow: 1; width: 100%; height: 100%; }
        .bus-popup { text-align: right; direction: rtl; min-width: 160px; }
        .bus-popup h3 { color: #1e3c72; margin-bottom: 5px; font-size: 15px; }
        .bus-popup p { font-size: 13px; color: #555; margin: 3px 0; }
    </style>
</head>
<body>

    <header>
        <h1>מערכת מעקב אוטובוסים ארצית בזמן אמת</h1>
        <div class="controls">
            <div class="input-group">
                <label for="lineInput">מספר קו:</label>
                <input type="text" id="lineInput" placeholder="למשל: 1">
            </div>
            <button onclick="searchBus()">אתר אוטובוסים</button>
        </div>
        <div id="loadingStatus" class="loading-container">⚡ מתחבר למאגר המידע הממשלתי הפתוח ושולף מיקומי GPS...</div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // אתחול המפה על מרכז הארץ
        const map = L.map('map').setView([32.0853, 34.7818], 9);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let busMarkers = [];

        async function searchBus() {
            const lineRef = document.getElementById('lineInput').value.trim();
            const loadingStatus = document.getElementById('loadingStatus');

            if (!lineRef) {
                alert('אנא הכנס מספר קו לחיפוש.');
                return;
            }

            loadingStatus.style.display = 'block';
            clearMarkers();

            try {
                // פנייה למאגר הפתוח של הסדנא לידע ציבורי דרך פרוקסי AllOrigins חסין אבטחה
                const targetUrl = `https://api.opentransit.org.il/siri/vehicle_locations?route_short_name=${encodeURIComponent(lineRef)}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('שגיאה בחיבור לשרת הנתונים');
                
                const wrapperData = await response.json();
                // הפרוקסי מחזיר את התוצאה המקורית בתוך מחרוזת טקסט תחת השדה contents
                const data = JSON.parse(wrapperData.contents);

                if (!data || data.length === 0) {
                    alert(`לא נמצאו אוטובוסים פעילים בנסיעה ברגע זה עבור קו ${lineRef}.`);
                    return;
                }

                let bounds = [];

                data.forEach(bus => {
                    const lat = bus.latitude;
                    const lon = bus.longitude;

                    if (lat && lon) {
                        const operator = bus.operator_name || 'מפעיל לא ידוע';
                        const destination = bus.destination_name || 'יעד לא צוין';
                        
                        let timeString = 'זמין';
                        if (bus.recorded_at_time) {
                            try {
                                timeString = new Date(bus.recorded_at_time).toLocaleTimeString('he-IL', {
                                    hour: '2-digit',
                                    minute: '2-digit',
                                    second: '2-digit'
                                });
                            } catch (e) {}
                        }

                        const popupContent = `
                            <div class="bus-popup">
                                <h3>קו ${lineRef} - ${operator}</h3>
                                <p><strong>יעד:</strong> ${destination}</p>
                                <p><strong>נצפה ב-GPS בגרף:</strong> ${timeString}</p>
                            </div>
                        `;

                        // יצירת אייקון נקודה בולט על המפה לכל אוטובוס
                        const marker = L.marker([lat, lon]).addTo(map).bindPopup(popupContent);
                        busMarkers.push(marker);
                        bounds.push([lat, lon]);
                    }
                });

                if (bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
                }

            } catch (error) {
                console.error('Error:', error);
                alert('אירעה שגיאה בעיבוד הנתונים. ודא שהקוד רץ מתוך הכתובת של GitHub Pages ונסה שוב.');
            } finally {
                loadingStatus.style.display = 'none';
            }
        }

        function clearMarkers() {
            busMarkers.forEach(marker => map.removeLayer(marker));
            busMarkers = [];
        }
    </script>
</body>
</html>
