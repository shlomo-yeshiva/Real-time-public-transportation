<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה - אוטובוסים בסביבה שלי</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
        }
        h1 { font-size: 20px; margin-bottom: 10px; font-weight: 600; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background-color: #ff9f43;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover { background-color: #f39c12; }
        button.geo-btn { background-color: #007bff; }
        button.geo-btn:hover { background-color: #0056b3; }
        
        .status-bar {
            margin-top: 10px;
            font-size: 13px;
            color: #f1c40f;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-weight: 500;
        }
        #map { flex-grow: 1; width: 100%; height: 100%; }
        .popup-rtl { text-align: right; direction: rtl; min-width: 160px; }
        .popup-rtl h3 { color: #1e3c72; margin-bottom: 5px; font-size: 15px; }
        .popup-rtl p { font-size: 13px; color: #555; margin: 3px 0; }
    </style>
</head>
<body>

    <header>
        <h1>רדאר תחבורה ציבורית - אוטובוסים באזור שלי</h1>
        <div class="controls">
            <button class="geo-btn" onclick="locateAndCenter()">📍 מצא את המיקום שלי וסרוק סביבה</button>
            <button onclick="updateBusesInView()">🔄 סרוק אוטובוסים באזור הנוכחי</button>
        </div>
        <div class="status-bar">
            <span id="loadingStatus">⏳ ממתין לזיהוי מיקום...</span>
            <span id="autoRefreshStatus">⏱️ עדכון אוטומטי חי פעיל (כל 15 שניות)</span>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // אתחול המפה על מרכז הארץ כברירת מחדל
        const map = L.map('map').setView([32.0853, 34.7818], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let busMarkers = [];
        let userMarker = null;
        let refreshInterval = null;
        let hasInitialLocation = false;

        // ברגע שהאתר עולה - מפעיל זיהוי מיקום ומתחיל שעון רענון
        window.onload = function() {
            locateAndCenter();
            
            // טיימר אוטומטי שמעדכן את האוטובוסים סביבך כל 15 שניות בלי לגעת במסך
            refreshInterval = setInterval(() => {
                if (hasInitialLocation) {
                    document.getElementById('autoRefreshStatus').innerText = "🔄 מעדכן אוטובוסים סביבך כעת...";
                    updateBusesInView();
                    setTimeout(() => {
                        document.getElementById('autoRefreshStatus').innerText = "⏱️ רענון אוטומטי פעיל (כל 15 שניות)";
                    }, 2000);
                }
            }, 15000);
        };

        // פונקציה שמאתרת את המשתמש, שמה סמן כחול וממרכזת את המפה עליו
        function locateAndCenter() {
            if (!navigator.geolocation) {
                alert("הדפדפן שלך לא תומך בשירותי מיקום.");
                return;
            }

            document.getElementById('loadingStatus').innerText = "⏳ מזהה מיקום GPS...";

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                if (userMarker) map.removeLayer(userMarker);

                // יצירת סמן כחול בולט למיקום שלך
                userMarker = L.circleMarker([lat, lon], {
                    radius: 9,
                    fillColor: "#007bff",
                    color: "#fff",
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                userMarker.bindPopup(`
                    <div class="popup-rtl">
                        <h3 style="color: #007bff;">📍 המיקום שלך</h3>
                        <p>האתר מציג אוטובוסים ברדיוס סביבך ברגע זה.</p>
                    </div>
                `);

                // ממרכז את המפה עליך בזום נוח לצפייה בשכונות (זום 14)
                map.setView([lat, lon], 14);
                hasInitialLocation = true;
                
                // מיד אחרי שמצאנו אותך, נשלוף את האוטובוסים שסביבך
                updateBusesInView();
            }, (error) => {
                document.getElementById('loadingStatus').innerText = "❌ שגיאה בקבלת מיקום";
                alert("אנא אשר גישה למיקום בהגדרות הדפדפן כדי לראות אוטובוסים סביבך.");
            }, { enableHighAccuracy: true });
        }

        // פונקציית הקסם: לוקחת את גבולות הראייה של המפה ומושכת רק את האוטובוסים ששם
        async function updateBusesInView() {
            const loadingStatus = document.getElementById('loadingStatus');
            loadingStatus.innerText = "⏳ סורק אוטובוסים בסביבה...";

            try {
                // לקיחת ארבעת הקצוות של המפה שאתה רואה כרגע על המסך
                const bounds = map.getBounds();
                const south = bounds.getSouthWest().lat;
                const west = bounds.getSouthWest().lng;
                const north = bounds.getNorthEast().lat;
                const east = bounds.getNorthEast().lng;

                // שאילתת Overpass חכמה - מביאה רק קווי אוטובוס פעילים בתוך הריבוע הגיאוגרפי הנוכחי שלך
                const overpassQuery = `
                    [out:json][timeout:20];
                    (
                      relation["type"="route"]["route"="bus"](${south},${west},${north},${east});
                    );
                    out body; >; out skel qt;`;

                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('שגיאת תקשורת');
                const data = await response.json();

                // ניקוי האוטובוסים מהסבב הקודם (משאיר את הנקודה הכחולה שלך קבועה)
                clearBusMarkers();

                if (!data.elements || data.elements.length === 0) {
                    loadingStatus.innerText = "🟢 אין אוטובוסים פעילים באזור זה כרגע";
                    return;
                }

                const nodes = {};
                data.elements.forEach(el => {
                    if (el.type === 'node') nodes[el.id] = [el.lat, el.lon];
                });

                let count = 0;

                data.elements.forEach(el => {
                    if (el.type === 'relation' && el.members) {
                        const operator = el.tags.operator || 'חברה';
                        const ref = el.tags.ref || 'קו';
                        const from = el.tags.from || 'מוצא';
                        const to = el.tags.to || 'יעד';

                        // מציג סמנים לאורך הנתיב הקיים כרגע בריבוע שלך
                        el.members.forEach((member, index) => {
                            if (member.type === 'node' && nodes[member.ref] && index % 5 === 0) {
                                const coords = nodes[member.ref];
                                
                                // בדיקה נוספת שהנקודה אכן בתוך הטווח הויזואלי
                                if (coords[0] >= south && coords[0] <= north && coords[1] >= west && coords[1] <= east) {
                                    
                                    // יצירת נקודה כתומה/חיה לכל אוטובוס בסביבה
                                    const marker = L.circleMarker(coords, {
                                        radius: 6.5,
                                        fillColor: "#ff3f34", // צבע אדום/כתום בולט לאוטובוסים סביבך
                                        color: "#fff",
                                        weight: 2,
                                        opacity: 1,
                                        fillOpacity: 0.85
                                    }).addTo(map);

                                    marker.bindPopup(`
                                        <div class="popup-rtl">
                                            <h3>קו ${ref} - ${operator}</h3>
                                            <p><strong>מסלול:</strong> מ${from} אל ${to}</p>
                                            <p>⚡ סטטוס: פעיל באזור שלך</p>
                                        </div>
                                    `);
                                    busMarkers.push(marker);
                                    count++;
                                }
