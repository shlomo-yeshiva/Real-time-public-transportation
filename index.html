<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רדאר תחבורה ציבורית - זמן אמת מוחלט</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
        }
        h1 { 
            font-size: 20px; 
            margin-bottom: 10px; 
            font-weight: 600; 
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background-color: #ffffff;
            color: #11998e;
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover { 
            background-color: #f0f0f0; 
        }
        button.geo-btn { 
            background-color: #007bff; 
            color: white; 
        }
        button.geo-btn:hover { 
            background-color: #0056b3; 
        }
        
        .status-bar {
            margin-top: 10px;
            font-size: 13px;
            color: #fff;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-weight: 500;
        }
        #map { 
            flex-grow: 1; 
            width: 100%; 
            height: 100%; 
        }
        .popup-rtl { 
            text-align: right; 
            direction: rtl; 
            min-width: 170px; 
        }
        .popup-rtl h3 { 
            color: #11998e; 
            margin-bottom: 6px; 
            font-size: 15px; 
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        .popup-rtl p { 
            font-size: 13px; 
            color: #555; 
            margin: 4px 0; 
        }
    </style>
</head>
<body>

    <header>
        <h1>📡 רדאר GPS - אוטובוסים פעילים בסביבה שלי (SIRI)</h1>
        <div class="controls">
            <button class="geo-btn" onclick="locateAndCenter()">📍 מצא אותי וסרוק סביבה</button>
            <button onclick="updateBusesInView()">🔄 סרוק אזור נוכחי מחדש</button>
        </div>
        <div class="status-bar">
            <span id="loadingStatus">🟢 המערכת מוכנה</span>
            <span id="autoRefreshStatus">⏱️ רענון אוטומטי חי (כל 15 שניות)</span>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // אתחול המפה על מרכז הארץ כברירת מחדל
        const map = L.map('map').setView([31.7845, 35.1901], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let busMarkers = [];
        let userMarker = null;
        let hasInitialLocation = false;

        // הפעלה מיידית עם עליית הדף
        window.onload = function() {
            locateAndCenter();
            
            // שעון רענון אוטומטי קבוע (כל 15 שניות) שמושך נתונים טריים מהלוויין
            setInterval(() => {
                updateBusesInView();
            }, 15000);
        };

        // פונקציית ה-GPS לאיתור מיקום המשתמש
        function locateAndCenter() {
            if (!navigator.geolocation) {
                document.getElementById('loadingStatus').innerText = "❌ דפדפן לא תומך ב-GPS";
                return;
            }
            document.getElementById('loadingStatus').innerText = "⏳ מזהה מיקום GPS...";

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                if (userMarker) map.removeLayer(userMarker);

                // נקודה כחולה למיקום שלך
                userMarker = L.circleMarker([lat, lon], {
                    radius: 9,
                    fillColor: "#007bff",
                    color: "#fff",
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                userMarker.bindPopup(`
                    <div class="popup-rtl">
                        <h3 style="color: #007bff;">📍 המיקום הנוכחי שלך</h3>
                        <p>הסורק מציג רכבים זזים סביבך.</p>
                    </div>
                `);

                map.setView([lat, lon], 15);
                hasInitialLocation = true;
                updateBusesInView();
            }, (error) => {
                document.getElementById('loadingStatus').innerText = "❌ אין אישור מיקום GPS";
                // אם המשתמש סירב ל-GPS, עדיין נטען אוטובוסים לפי מה שמופיע כרגע על המסך
                updateBusesInView();
            }, { enableHighAccuracy: true });
        }

        // פונקציית הליבה: שאיבת מיקומי ה-GPS האמיתיים של האוטובוסים בזמן אמת
        async function updateBusesInView() {
            const loadingStatus = document.getElementById('loadingStatus');
            loadingStatus.innerText = "⚡ מתחבר ללוויין הציבורי...";

            try {
                // חישוב ארבעת קצוות המפה הויזואליים שמוצגים כרגע על המסך
                const bounds = map.getBounds();
                const south = bounds.getSouthWest().lat;
                const west = bounds.getSouthWest().lng;
                const north = bounds.getNorthEast().lat;
                const east = bounds.getNorthEast().lng;

                // שרת ה-API הרשמי של האוטובוסים בזמן אמת (SIRI)
                const targetUrl = `https://api.opentransit.org.il/siri/vehicle_locations?min_lat=${south}&min_lon=${west}&max_lat=${north}&max_lon=${east}`;
                
                // פרוקסי פיתוח מהיר, יציב וללא מגבלות עומס, שעוקף חסימות CORS בדפדפן
                const proxyUrl = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error();
                const data = await response.json();

                // ניקוי הסמנים הישנים של האוטובוסים (משאיר את המיקום שלך קבוע)
                clearBusMarkers();

                if (!data || data.length === 0) {
                    loadingStatus.innerText = "🟢 אין אוטובוסים בתנועה באזור זה כרגע";
                    return;
                }

                let count = 0;

                data.forEach(bus => {
                    const lat = bus.latitude;
                    const lon = bus.longitude;

                    if (lat && lon) {
                        const lineRef = bus.route_short_name || '??';
                        const operator = bus.operator_name || 'חברה';
                        const destination = bus.destination_name || 'בנסיעה';
                        
                        let timeString = 'זמן אמת';
                        if (bus.recorded_at_time) {
                            try {
                                timeString = new Date(bus.recorded_at_time).toLocaleTimeString('he-IL', {
                                    hour: '2-digit', minute: '2-digit'
                                });
                            } catch(e) {}
                        }

                        // יצירת נקודה אדומה ובולטת לכל אוטובוס שמשדר כעת בכביש
                        const marker = L.circleMarker([lat, lon], {
                            radius: 7.5,
                            fillColor: "#ff4757",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.95
                        }).addTo(map);

                        marker.bindPopup(`
                            <div class="popup-rtl">
                                <h3>קו ${lineRef} - ${operator}</h3>
                                <p><strong>יעד:</strong> ${destination}</p>
                                <p>⏱️ <strong>עדכון אחרון:</strong> ${timeString}</p>
                                <p style="color: #2ed573; font-weight: bold;">🟢 משדר GPS פעיל בתנועה</p>
                            </div>
                        `);
                        
                        busMarkers.push(marker);
                        count++;
                    }
                });

                loadingStatus.innerText = `🟢 רדאר חי: מציג ${count} אוטובוסים פיזיים בנסיעה`;

            } catch (error) {
                console.error(error);
                loadingStatus.innerText = "❌ שגיאה זמנית בתקשורת לווין (מנסה שוב אוטומטית...)";
            }
        }

        function clearBusMarkers() {
            busMarkers.forEach(marker => map.removeLayer(marker));
            busMarkers = [];
        }

        // סריקה אוטומטית דינמית בכל פעם שאתה מזיז את המפה עם האצבע או העכבר
        map.on('moveend', () => {
            updateBusesInView();
        });
    </script>
</body>
</html>
