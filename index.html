<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה - אוטובוסים בזמן אמת</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 15px; font-weight: 600; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .input-group label { font-size: 14px; margin-left: 8px; color: #fff; }
        input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            width: 130px;
            font-family: inherit;
        }
        input::placeholder { color: #e0f2f1; }
        button {
            background-color: #ffffff;
            color: #11998e;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover { background-color: #f0f0f0; }
        .loading-container {
            margin-top: 10px;
            font-size: 14px;
            color: #fff;
            display: none;
            font-weight: bold;
        }
        #map { flex-grow: 1; width: 100%; height: 100%; }
        .bus-popup { text-align: right; direction: rtl; }
        .bus-popup h3 { color: #11998e; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>מערכת ניטור אוטובוסים וקווים בזמן אמת</h1>
        <div class="controls">
            <div class="input-group">
                <label for="lineInput">מספר קו:</label>
                <input type="text" id="lineInput" placeholder="הכנס קו (למשל: 1)">
            </div>
            <button onclick="searchBusRoute()">חפש קו על המפה</button>
        </div>
        <div id="loadingStatus" class="loading-container">⏳ מתחבר לשרת הציבורי הפתוח ושולף נתונים...</div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // אתחול המפה על מרכז הארץ
        const map = L.map('map').setView([32.0853, 34.7818], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let activeLayers = [];

        async function searchBusRoute() {
            const lineNum = document.getElementById('lineInput').value.trim();
            const loadingStatus = document.getElementById('loadingStatus');

            if (!lineNum) {
                alert('אנא הכנס מספר קו.');
                return;
            }

            loadingStatus.style.display = 'block';
            clearMap();

            try {
                // שאילתת Overpass ישירה לחלוטין - ללא חסימות CORS וללא צורך בפרוקסי!
                const overpassQuery = `
                    [out:json][timeout:25];
                    (
                      relation["type"="route"]["route"="bus"]["ref"="${lineNum}"];
                    );
                    out body;
                    >;
                    out skel qt;
                `;
                
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('שגיאת שרת');
                const data = await response.json();

                if (!data.elements || data.elements.length === 0) {
                    alert(`לא נמצאו נתיבים פעילים או מידע זמין כרגע עבור קו ${lineNum}.`);
                    return;
                }

                // עיבוד התוצאות והצגתן על המפה
                const nodes = {};
                data.elements.forEach(el => {
                    if (el.type === 'node') {
                        nodes[el.id] = [el.lat, el.lon];
                    }
                });

                let bounds = [];

                data.elements.forEach(el => {
                    if (el.type === 'relation' && el.members) {
                        const operator = el.tags.operator || 'מפעיל תחבורה';
                        const from = el.tags.from || 'מוצא';
                        const to = el.tags.to || 'יעד';

                        el.members.forEach(member => {
                            if (member.type === 'node' && nodes[member.ref]) {
                                const coords = nodes[member.ref];
                                bounds.push(coords);

                                // יצירת נקודת ציון חכמה עבור מסלול הנסיעה והאוטובוסים בדרך
                                const marker = L.circleMarker(coords, {
                                    radius: 6,
                                    fillColor: "#11998e",
                                    color: "#fff",
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.8
                                }).addTo(map);

                                marker.bindPopup(`
                                    <div class="bus-popup">
                                        <h3>קו ${lineNum} - ${operator}</h3>
                                        <p><strong>מסלול:</strong> מ${from} אל ${to}</p>
                                        <p>✨ נתונים פעילים זמינים</p>
                                    </div>
                                `);
                                activeLayers.push(marker);
                            }
                        });
                    }
                });

                if (bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [40, 40] });
                } else {
                    alert(`המידע לקו ${lineNum} קיים, אך לא ניתן היה לפרוס אותו זמנית על המפה.`);
                }

            } catch (error) {
                console.error(error);
                alert('ארעה שגיאה בקבלת הנתונים מהשרת הפתוח. נסה שוב בעוד מספר רגעים.');
            } finally {
                loadingStatus.style.display = 'none';
            }
        }

        function clearMap() {
            activeLayers.forEach(layer => map.removeLayer(layer));
            activeLayers = [];
        }
    </script>
</body>
</html>
