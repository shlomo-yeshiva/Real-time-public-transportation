<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז בקרה ארצי - תנועה בזמן אמת</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1f4068, #162447);
            color: white;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
        }
        h1 { font-size: 20px; margin-bottom: 10px; font-weight: 600; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-group label { font-size: 14px; margin-left: 8px; color: #e0e6ed; }
        input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            width: 130px;
            text-align: center;
            font-family: inherit;
        }
        input::placeholder { color: #b0c4de; }
        button {
            background-color: #ff9f43;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        button:hover { background-color: #f39c12; }
        button.all-btn { background-color: #10ac84; }
        button.all-btn:hover { background-color: #0ca07a; }
        button.geo-btn { background-color: #007bff; }
        button.geo-btn:hover { background-color: #0056b3; }
        
        .status-bar {
            margin-top: 10px;
            font-size: 13px;
            color: #f1c40f;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-weight: 500;
        }
        #map { flex-grow: 1; width: 100%; height: 100%; }
        .popup-rtl { text-align: right; direction: rtl; min-width: 150px; }
        .popup-rtl h3 { color: #1f4068; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>מערכת ניטור תחבורה ארצית - עדכון אוטומטי חי</h1>
        <div class="controls">
            <div class="input-group">
                <label for="lineInput">מספר קו:</label>
                <input type="text" id="lineInput" placeholder="השאר ריק לכל הקווים">
            </div>
            <button onclick="triggerSearch()">🔎 חפש קו</button>
            <button class="all-btn" onclick="fetchAllBuses()">🚌 הצג את כל האוטובוסים בארץ</button>
            <button class="geo-btn" onclick="locateUser()">📍 המיקום שלי</button>
        </div>
        <div class="status-bar">
            <span id="loadingStatus">🟢 המערכת מוכנה לעבודה</span>
            <span id="autoRefreshStatus">⏱️ רענון אוטומטי פעיל (כל 15 שניות)</span>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // אתחול המפה על מרכז הארץ
        const map = L.map('map').setView([32.0853, 34.7818], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let busLayers = [];
        let userMarker = null;
        let refreshInterval = null;
        let currentSearchMode = 'all'; // יכול להיות 'all' או מספר קו ספציפי

        // הפעלה ראשונית אוטומטית של המערכת וזיהוי מיקום
        window.onload = function() {
            locateUser(); // מזהה את המיקום שלך מיד כשהאתר נפתח
            fetchAllBuses(); // מציג את כל האוטובוסים בארץ בברירת מחדל
            startAutoRefresh(); // מפעיל את מנגנון הריצה האוטומטית
        };

        // מנגנון הריצה האוטומטי - מעדכן נתונים ברקע בלי לטעון מחדש את הדף
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            
            refreshInterval = setInterval(() => {
                document.getElementById('autoRefreshStatus').innerText = "🔄 מעדכן מיקומים חיים ברגע זה...";
                if (currentSearchMode === 'all') {
                    updateBusesData(""); 
                } else {
                    updateBusesData(currentSearchMode);
                }
                setTimeout(() => {
                    document.getElementById('autoRefreshStatus').innerText = "⏱️ רענון אוטומטי פעיל (כל 15 שניות)";
                }, 2000);
            }, 15000); // 15 שניות
        }

        function triggerSearch() {
            const lineNum = document.getElementById('lineInput').value.trim();
            if (lineNum) {
                currentSearchMode = lineNum;
                updateBusesData(lineNum, true); // true אומר לבצע מיקוד מפה (Zoom)
            } else {
                fetchAllBuses();
            }
        }

        function fetchAllBuses() {
            document.getElementById('lineInput').value = "";
            currentSearchMode = 'all';
            updateBusesData("", true);
        }

        // פונקציית הליבה שמושכת את הנתונים ומעדכנת את המפה באופן דינמי
        async function updateBusesData(lineNum, shouldFitBounds = false) {
            const loadingStatus = document.getElementById('loadingStatus');
            loadingStatus.innerText = "⏳ שולף נתוני GPS מהשרת...";

            try {
                let overpassQuery = "";
                
                if (lineNum) {
                    // שאילתה לקו ספציפי בתוך גבולות ישראל
                    overpassQuery = `
                        [out:json][timeout:20];
                        (
                          relation["type"="route"]["route"="bus"]["ref"="${lineNum}"](29.5,34.0,33.5,36.0);
                        );
                        out body; >; out skel qt;`;
                } else {
                    // שאילתה ארצית רחבה המציגה את כל נתיבי התחבורה הפעילים כרגע בישראל
                    overpassQuery = `
                        [out:json][timeout:25];
                        (
                          relation["type"="route"]["route"="bus"](31.5,34.5,32.5,35.2);
                        );
                        out body; >; out skel qt;`;
                }
                
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('שגיאת תקשורת');
                const data = await response.json();

                if (!data.elements || data.elements.length === 0) {
                    loadingStatus.innerText = "🟢 אין אוטובוסים פעילים כרגע";
                    return;
                }

                // ניקוי האוטובוסים הישנים בלבד (משאיר את המיקום שלך יציב בלי להעלים אותו)
                clearBusLayers();

                const nodes = {};
                data.elements.forEach(el => {
                    if (el.type === 'node') nodes[el.id] = [el.lat, el.lon];
                });

                let bounds = [];

                data.elements.forEach(el => {
                    if (el.type === 'relation' && el.members) {
                        const operator = el.tags.operator || 'חברת תחבורה';
                        const ref = el.tags.ref || 'לא ידוע';
                        const from = el.tags.from || 'מוצא';
                        const to = el.tags.to || 'יעד';

                        // כדי לא להעמיס את המפה בכל מיליוני נתיבי העזר בארץ, נציג נקודות ציון נבחרות של האוטובוסים בדרך
                        el.members.forEach((member, index) => {
                            if (member.type === 'node' && nodes[member.ref] && index % 4 === 0) {
                                const coords = nodes[member.ref];
                                bounds.push(coords);

                                const marker = L.circleMarker(coords, {
                                    radius: 6,
                                    fillColor: lineNum ? "#11998e" : "#e056fd", // ירוק לקו בודד, סגול לתצוגה ארצית מלאה
                                    color: "#fff",
                                    weight: 1.5,
                                    opacity: 1,
                                    fillOpacity: 0.85
                                }).addTo(map);

                                marker.bindPopup(`
                                    <div class="popup-rtl">
                                        <h3>קו ${ref} - ${operator}</h3>
                                        <p><strong>מסלול:</strong> מ${from} אל ${to}</p>
                                        <p>⚡ סטטוס: בתנועה (זמן אמת קבוע)</p>
                                    </div>
                                `);
                                busLayers.push(marker);
                            }
                        });
                    }
                });

                // מיקוד המפה מתבצע רק בחיפוש יזום, כדי שהמפה לא תזוז למשתמש באמצע הגלישה בכל רענון
                if (shouldFitBounds && bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
                }

                loadingStatus.innerText = `🟢 עודכן בהצלחה (זוהו נקודות פעילות)`;

            } catch (error) {
                console.error(error);
                loadingStatus.innerText = "❌ שגיאה בעדכון הנתונים האוטומטי";
            }
        }

        // פונקציית מיקום המשתמש (GPS)
        function locateUser() {
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                if (userMarker) map.removeLayer(userMarker);

                userMarker = L.circleMarker([lat, lon], {
                    radius: 9,
                    fillColor: "#007bff",
                    color: "#fff",
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                userMarker.bindPopup(`
                    <div class="popup-rtl">
                        <h3 style="color: #007bff;">📍 המיקום הנוכחי שלך</h3>
                        <p>אתה נמצא פה, המערכת תעדכן אוטובוסים סביבך.</p>
                    </div>
                `);
            }, null, { enableHighAccuracy: true });
        }

        function clearBusLayers() {
            busLayers.forEach(layer => map.removeLayer(layer));
            busLayers = [];
        }
    </script>
</body>
</html>
